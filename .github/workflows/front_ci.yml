name: 💻 Front-End CI DevSecOps

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  quality-and-tests:
    name: 🧪 Quality, Lint & Tests
    runs-on: ubuntu-latest

    permissions:
          issues: write
          contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # ==========================================
      # 🛡️ SÉCURITÉ (SAST & SCA)
      # ==========================================
      - name: 📦 Dependency Vulnerability Scan (SCA)
        run: pnpm audit --audit-level=high

      - name: 🔑 Secret Detection Scan (TruffleHog / GitLeaks lite)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

      # ==========================================
      # 🧪 QUALITÉ & TESTS
      # ==========================================
      - name: 🚀 Fast Linting (Oxlint Rust)
        run: pnpm lint:oxlint

      - name: 🔍 Deep Linting (ESLint)
        run: pnpm lint:eslint

      - name: ⚙️ Type Checking (TypeScript)
        run: pnpm type-check

      - name: 🧪 Unit Tests (Vitest)
        run: pnpm test:unit --run

      # ==========================================
      # 🛡️ SÉCURITÉ DYNAMIQUE (DAST) - OWASP ZAP
      # ==========================================
      - name: 🏗️ Build Front-End for DAST Scan
        run: pnpm build

      - name: 🌐 Start Local Server for OWASP ZAP
        run: pnpm exec vite preview --port 4173 &

      - name: ⏱️ Wait for Server Ready
        run: npx wait-on http://localhost:4173 --timeout 30000

      - name: 🛡️ OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:4173'
          rules_file_name: '.zap/rules.tsv'
          fail_action: false
