name: 💻 Front-End CI DevSecOps

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  quality-and-tests:
    name: 🧪 Quality, Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # ==========================================
      # 🛡️ SÉCURITÉ (SAST & SCA)
      # ==========================================
      - name: 📦 Dependency Vulnerability Scan (SCA)
        run: pnpm audit --audit-level=high

      - name: 🔑 Secret Detection Scan (TruffleHog / GitLeaks lite)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

      # ==========================================
      # 🧪 QUALITÉ & TESTS
      # ==========================================
      - name: 🚀 Fast Linting (Oxlint Rust)
        run: pnpm lint:oxlint

      - name: 🔍 Deep Linting (ESLint)
        run: pnpm lint:eslint

      - name: ⚙️ Type Checking (TypeScript)
        run: pnpm type-check

      - name: 🧪 Unit Tests (Vitest)
        run: pnpm test:unit --run
