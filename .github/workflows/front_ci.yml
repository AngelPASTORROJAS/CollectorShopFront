name: 💻 Front-End CI DevSecOps

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  quality-and-tests:
    name: 🧪 Quality, Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # pnpm gère le cache tout seul si on lui demande gentiment
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # L'action officielle de Node peut s'occuper de mapper le cache de pnpm proprement
      - name: Setup Node with pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🚀 Fast Linting (Oxlint Rust)
        run: pnpm lint:oxlint

      - name: 🔍 Deep Linting (ESLint)
        run: pnpm lint:eslint

      - name: ⚙️ Type Checking (TypeScript)
        run: pnpm type-check

      - name: 🧪 Unit Tests (Vitest)
        run: pnpm test:unit --run
